name: Visual smoke

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visual-smoke:
    name: Capture static page screenshots
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Capture screenshots
        run: node scripts/visual-smoke.mjs

      - name: Compare visual baselines
        run: node scripts/visual-regression.mjs

      - name: Upload screenshots
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: visual-smoke-screenshots
          path: |
            artifacts/visual-smoke/*.png
            artifacts/visual-regression/*.png
          if-no-files-found: error
