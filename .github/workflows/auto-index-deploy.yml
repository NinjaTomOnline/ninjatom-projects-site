name: Auto index and deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "17 10 * * 1"
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Generate repo index and package site
    runs-on: ubuntu-latest

    outputs:
      pages_build_type: ${{ steps.pages-config.outputs.build_type }}
      artifact_path: ${{ steps.stage.outputs.artifact_path }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Read current Pages configuration
        id: pages-config
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          async function main() {
            const outputPath = process.env.GITHUB_OUTPUT;
            const token = process.env.GITHUB_TOKEN;
            const repository = process.env.GITHUB_REPOSITORY;
            const response = await fetch(`https://api.github.com/repos/${repository}/pages`, {
              headers: {
                Accept: "application/vnd.github+json",
                Authorization: `Bearer ${token}`,
                "X-GitHub-Api-Version": "2022-11-28",
              },
            });

            if (!response.ok) {
              console.log(`Pages configuration lookup returned ${response.status}; deploy will be skipped until Pages is configured.`);
              fs.appendFileSync(outputPath, "build_type=unknown\n");
              return;
            }

            const pages = await response.json();
            fs.appendFileSync(outputPath, `build_type=${pages.build_type || "unknown"}\n`);
            console.log(`Current Pages build_type: ${pages.build_type || "unknown"}`);
          }

          main().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          NODE

      - name: Configure Pages metadata
        uses: actions/configure-pages@v6

      - name: Generate GitHub org repository index
        env:
          GITHUB_ORG: NinjaTomOnline
          ORG_PAT: ${{ secrets.ORG_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/fetch-repos.mjs

      - name: Generate project share pages and deploy status
        run: |
          node scripts/generate-project-share-assets.mjs
          node scripts/write-deploy-status.mjs

      - name: Install dependencies and run existing build command
        run: |
          if [ ! -f package.json ]; then
            echo "Plain static site detected; no npm install or build command is required."
            exit 0
          fi

          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

          if node -e "const pkg = require('./package.json'); process.exit(pkg.scripts && pkg.scripts.build ? 0 : 1)"; then
            npm run build
          else
            echo "package.json exists, but no build script is defined."
          fi

      - name: Determine and stage Pages artifact
        id: stage
        run: |
          set -euo pipefail

          output_path="_pages"
          rm -rf "$output_path"
          mkdir -p "$output_path"

          source_path=""
          for candidate in "_site" "dist" "out" "public"; do
            if [ -f "$candidate/index.html" ]; then
              source_path="$candidate"
              break
            fi
          done

          if [ -z "$source_path" ] && [ -f "index.html" ]; then
            source_path="."
          fi

          if [ -z "$source_path" ]; then
            echo "No supported static site output found." >&2
            exit 1
          fi

          echo "Static source path: $source_path"
          if [ "$source_path" = "." ]; then
            rsync -a --delete \
              --exclude=".git/" \
              --exclude=".github/" \
              --exclude=".lighthouseci/" \
              --exclude="artifacts/" \
              --exclude="docs/" \
              --exclude="examples/" \
              --exclude="scripts/" \
              --exclude="tests/" \
              --exclude="_pages/" \
              --exclude=".DS_Store" \
              ./ "$output_path/"
          else
            rsync -a --delete "$source_path"/ "$output_path/"
          fi

          test -f "$output_path/index.html"
          test -f "$output_path/CNAME"
          echo "artifact_path=$output_path" >> "$GITHUB_OUTPUT"

      - name: Upload static files as Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ steps.stage.outputs.artifact_path }}
          include-hidden-files: true

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: needs.build.outputs.pages_build_type == 'workflow'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5

  verify-pages:
    name: Verify Pages DNS and HTTPS
    needs:
      - build
      - deploy
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Query GitHub Pages API
        env:
          EXPECTED_DOMAIN: ninjatomapps.com
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          mkdir -p artifacts/pages-verification
          node <<'NODE'
          const fs = require("node:fs/promises");
          async function main() {
            const expectedDomain = process.env.EXPECTED_DOMAIN;
            const repository = process.env.GITHUB_REPOSITORY;
            const token = process.env.GITHUB_TOKEN;
            const deployResult = process.env.DEPLOY_RESULT;
            const response = await fetch(`https://api.github.com/repos/${repository}/pages`, {
              headers: {
                Accept: "application/vnd.github+json",
                Authorization: `Bearer ${token}`,
                "X-GitHub-Api-Version": "2022-11-28",
              },
            });

            let pages = {};
            let ok = false;
            let status = `FAIL: GitHub Pages API returned ${response.status}.`;

            if (response.ok) {
              pages = await response.json();
              const cnameOk = pages.cname === expectedDomain;
              const httpsOk = pages.https_enforced === true;
              const urlOk = typeof pages.html_url === "string" && pages.html_url.startsWith(`https://${expectedDomain}`);
              ok = cnameOk && httpsOk && urlOk;
              status = ok
                ? `OK: ${expectedDomain} is connected with HTTPS enforced.`
                : `FAIL: cname=${pages.cname || "none"}, https_enforced=${pages.https_enforced}, html_url=${pages.html_url || "none"}.`;
            }

            const report = {
              ok,
              status,
              checkedAt: new Date().toISOString(),
              expectedDomain,
              deployResult,
              pages,
            };

            await fs.writeFile("artifacts/pages-verification/pages-status.json", `${JSON.stringify(report, null, 2)}\n`);
            await fs.writeFile("artifacts/pages-verification/README.md", `${status}\n\nDeploy job result: ${deployResult}.\n`);
            console.log(status);
          }

          main().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          NODE

      - name: Upload Pages verification artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pages-dns-https-verification
          path: artifacts/pages-verification
          if-no-files-found: error
