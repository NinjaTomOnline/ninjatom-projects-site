<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">NinjaTom Apps social preview</title>
  <desc id="desc">A dark premium social preview card for NinjaTom Apps, an indie app studio project hub.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="78%" cy="28%" r="78%">
      <stop offset="0" stop-color="#17305e"/>
      <stop offset=".36" stop-color="#071329"/>
      <stop offset="1" stop-color="#03050b"/>
    </radialGradient>
    <linearGradient id="purpleText" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d9c8ff"/>
      <stop offset=".4" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#151925"/>
      <stop offset="1" stop-color="#070b13"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset=".55" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#14f1c8"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.58 0 0 0 0 0.23 0 0 0 0 1 0 0 0 .9 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000" flood-opacity=".48"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#38bdf8" flood-opacity=".18"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0v48" fill="none" stroke="#ffffff" stroke-opacity=".045" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGlow)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <path d="M-60 562C175 416 272 624 506 477c199-125 359-437 812-249" fill="none" stroke="#38bdf8" stroke-opacity=".12" stroke-width="2"/>
  <path d="M-70 118C175 51 319 251 546 139c242-119 348-121 719-56" fill="none" stroke="#a855f7" stroke-opacity=".18" stroke-width="2"/>

  <g transform="translate(70 60)">
    <g filter="url(#softGlow)">
      <path d="M0 39C9 15 29 2 57 0c12-1 22 1 28 6-3 12-10 24-20 35C46 62 24 75 0 84V39Z" fill="#8b5cf6"/>
    </g>
    <path d="M14 40c9-15 23-24 43-26 6 0 12 1 16 2-3 8-8 16-16 23-12 11-26 16-43 17V40Z" fill="#f8fafc"/>
    <circle cx="35" cy="38" r="5" fill="#05070d"/>
    <circle cx="55" cy="34" r="5" fill="#05070d"/>
  </g>

  <text x="175" y="104" fill="#f8fafc" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="42" font-weight="800">NinjaTom</text>
  <text x="404" y="104" fill="#a855f7" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="42" font-weight="800">Apps</text>

  <g transform="translate(72 188)">
    <text x="0" y="0" fill="#f8fafc" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="86" font-weight="900">NinjaTom Apps</text>
    <text x="0" y="96" fill="url(#purpleText)" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="86" font-weight="900">Project Hub</text>
    <text x="2" y="158" fill="#d8deea" font-family="Inter, SF Pro Text, Arial, sans-serif" font-size="31" font-weight="700">Independent apps, tools, games,</text>
    <text x="2" y="198" fill="#d8deea" font-family="Inter, SF Pro Text, Arial, sans-serif" font-size="31" font-weight="700">and creative software.</text>
    <text x="2" y="250" fill="#9ca8ba" font-family="Inter, SF Pro Text, Arial, sans-serif" font-size="25" font-weight="500">A living GitHub Pages project gallery.</text>
    <text x="2" y="306" fill="#6ee7f9" font-family="Inter, SF Pro Text, Arial, sans-serif" font-size="28" font-weight="800">ninjatomapps.com</text>
  </g>

  <g transform="translate(735 142)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="328" height="188" rx="24" fill="url(#panel)" stroke="#38bdf8" stroke-opacity=".55"/>
    <rect x="22" y="22" width="284" height="98" rx="16" fill="#0c1220" stroke="#ffffff" stroke-opacity=".09"/>
    <path d="M44 91c40-45 71-18 102-46 24-21 56-24 106-7" fill="none" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="246" cy="39" r="6" fill="#14f1c8"/>
    <circle cx="268" cy="39" r="6" fill="#38bdf8"/>
    <circle cx="290" cy="39" r="6" fill="#a855f7"/>
    <text x="25" y="154" fill="#f8fafc" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="31" font-weight="800">SwiftTerm</text>
    <text x="205" y="154" fill="#6ee7f9" font-family="Inter, SF Pro Text, Arial, sans-serif" font-size="17" font-weight="700">Tool</text>
  </g>

  <g transform="translate(665 312)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="300" height="176" rx="24" fill="url(#panel)" stroke="#a855f7" stroke-opacity=".58"/>
    <rect x="22" y="22" width="88" height="88" rx="22" fill="#f8fafc"/>
    <path d="M65 43c23 0 38 14 38 33s-15 33-38 33-38-14-38-33 15-33 38-33Z" fill="#12284a"/>
    <rect x="45" y="62" width="41" height="35" rx="10" fill="#93c5fd"/>
    <circle cx="55" cy="78" r="3" fill="#10203c"/>
    <circle cx="66" cy="78" r="3" fill="#10203c"/>
    <circle cx="77" cy="78" r="3" fill="#10203c"/>
    <text x="130" y="60" fill="#f8fafc" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="32" font-weight="800">DoorCodes</text>
    <text x="130" y="95" fill="#b9c0ce" font-family="Inter, SF Pro Text, Arial, sans-serif" font-size="18" font-weight="600">Access codes, ready</text>
    <text x="130" y="121" fill="#b9c0ce" font-family="Inter, SF Pro Text, Arial, sans-serif" font-size="18" font-weight="600">on arrival.</text>
  </g>

  <g transform="translate(904 365)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="226" height="152" rx="22" fill="url(#panel)" stroke="#14f1c8" stroke-opacity=".45"/>
    <text x="24" y="48" fill="#f8fafc" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="29" font-weight="800">FlowGuru</text>
    <text x="24" y="82" fill="#b9c0ce" font-family="Inter, SF Pro Text, Arial, sans-serif" font-size="16" font-weight="600">Focus systems</text>
    <text x="24" y="108" fill="#b9c0ce" font-family="Inter, SF Pro Text, Arial, sans-serif" font-size="16" font-weight="600">for getting unstuck.</text>
    <path d="M164 52c22 9 32 27 25 49-8 22-28 33-50 27-22-7-35-26-29-48 6-24 31-38 54-28Z" fill="#14f1c8" fill-opacity=".18" stroke="#14f1c8" stroke-width="3"/>
  </g>

  <rect x="72" y="568" width="1056" height="2" fill="url(#line)" opacity=".65"/>
</svg>
